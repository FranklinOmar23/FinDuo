services:
  - type: web
    name: finduo-web
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @finduo/web build
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://finduo.onrender.com/api