<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <script>
      (function redirectToHashRoute() {
        var path = window.location.pathname || "/";
        var search = window.location.search || "";
        var hashPath = path === "/" ? "/" : path;
        var target = "/#" + hashPath + search;

        window.location.replace(target);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1719;
        color: #edf6f4;
        font-family: "Trebuchet MS", sans-serif;
      }

      p {
        opacity: 0.88;
      }
    </style>
  </head>
  <body>
    <p>Redirigiendo a FinDúo...</p>
  </body>
</html>
